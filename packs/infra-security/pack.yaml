slug: infra-security
name: Infrastructure Security
kind: detection
action: block
version: 4
schema_version: 1
author: pullminder
max_weight: 10
scoring:
  - min_findings: 1
    score: 5
  - min_findings: 3
    score: 10
patterns:
  # --- Docker (1-5) ---

  - name: Docker privileged mode
    rule_id: INFRA_DOCKER_PRIVILEGED
    regex: '(?i)privileged:\s*true'
    language: "*"
    severity: error
    category: infra

  - name: Docker running as root
    rule_id: INFRA_DOCKER_ROOT
    regex: '(?i)^USER\s+root\s*$'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      dockerfile: 'Use a non-root USER directive'

  - name: Docker FROM latest tag
    rule_id: INFRA_DOCKER_LATEST
    regex: '(?i)^FROM\s+\S+:latest\b'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      dockerfile: 'Pin to a specific image version tag'

  - name: Docker COPY all copies secrets
    rule_id: INFRA_DOCKER_COPY_ALL
    regex: '(?i)^COPY\s+\.\s+\.'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      dockerfile: 'Use .dockerignore and copy specific files'

  - name: Docker ADD with remote URL
    rule_id: INFRA_DOCKER_ADD_REMOTE
    regex: '(?i)^ADD\s+https?://'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      dockerfile: 'Use COPY with curl/wget for better control'

  # --- Kubernetes (6-10) ---

  - name: Kubernetes host network
    rule_id: INFRA_K8S_HOSTNET
    regex: '(?i)hostNetwork:\s*true'
    language: "*"
    severity: error
    category: infra

  - name: Kubernetes host PID
    rule_id: INFRA_K8S_HOSTPID
    regex: '(?i)hostPID:\s*true'
    language: "*"
    severity: error
    category: infra

  - name: Kubernetes empty resource limits
    rule_id: INFRA_K8S_NO_LIMITS
    regex: '(?i)resources:\s*\{\}'
    language: "*"
    severity: warning
    category: infra

  - name: Kubernetes automount service account token
    rule_id: INFRA_K8S_AUTOMOUNT
    regex: '(?i)automountServiceAccountToken:\s*true'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      kubernetes: 'Set automountServiceAccountToken: false unless needed'

  - name: Kubernetes wildcard RBAC
    rule_id: INFRA_K8S_WILDCARD_RBAC
    regex: '(?i)resources:\s*\[\s*["'']\*["'']\s*\]'
    language: "*"
    severity: error
    category: infra

  # --- Terraform (11-14) ---

  - name: Terraform hardcoded secret
    rule_id: INFRA_TF_SECRET
    regex: '(?i)(password|secret|token)\s*=\s*"[^"]{8,}"'
    language: "*"
    severity: error
    category: infra

  - name: Terraform open CIDR
    rule_id: INFRA_TF_OPEN_CIDR
    regex: '(?i)cidr_blocks\s*=\s*\[\s*["'']0\.0\.0\.0/0["'']'
    language: "*"
    severity: warning
    category: infra

  - name: Terraform public S3 ACL
    rule_id: INFRA_TF_PUBLIC_S3
    regex: '(?i)acl\s*=\s*["''](public-read|public-read-write)["'']'
    language: "*"
    severity: error
    category: infra

  - name: Terraform IAM wildcard action
    rule_id: INFRA_TF_IAM_STAR
    regex: '(?i)actions\s*=\s*\[\s*["'']\*["'']\s*\]'
    language: "*"
    severity: error
    category: infra

  # --- CI/CD (15-17) ---

  - name: GitHub Actions script injection
    rule_id: INFRA_GHA_INJECT
    regex: '(?i)\$\{\{\s*github\.event\.(issue|pull_request|comment)\.'
    language: "*"
    severity: error
    category: infra

  - name: GitHub Actions pull_request_target
    rule_id: INFRA_GHA_PR_TARGET
    regex: '(?i)pull_request_target'
    language: "*"
    severity: warning
    category: infra

  - name: GitHub Actions unpinned action version
    rule_id: INFRA_GHA_UNPINNED
    regex: '(?i)uses:\s*\S+@(main|master|latest)\b'
    language: "*"
    severity: warning
    category: infra
    fix_templates:
      yaml: 'Pin actions to a specific SHA or version tag'

config_files:
  - pattern: ".github/workflows/"
    label: CI/CD workflow
  - pattern: ".github/actions/"
    label: GitHub Action
  - pattern: Jenkinsfile
    label: Jenkins pipeline
  - pattern: ".gitlab-ci"
    label: GitLab CI
  - pattern: ".circleci/"
    label: CircleCI config
  - pattern: "terraform/"
    label: Terraform IaC
  - pattern: ".tf"
    label: Terraform file
  - pattern: "kubernetes/"
    label: Kubernetes manifest
  - pattern: "k8s/"
    label: Kubernetes manifest
  - pattern: "helm/"
    label: Helm chart
  - pattern: Caddyfile
    label: Reverse proxy config
  - pattern: nginx.conf
    label: Nginx config
  - pattern: docker-compose
    label: Docker Compose
  - pattern: CODEOWNERS
    label: Code ownership
  - pattern: permissions
    label: Permission config
overrides:
  scoring:
    type: scored_tiers
    label: "Scoring Tiers"
    description: "Finding count thresholds and their corresponding weight scores"
    default_from: scoring
