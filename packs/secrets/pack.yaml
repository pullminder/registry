slug: secrets
name: Secrets Detection
kind: detection
action: block
version: 5
schema_version: 1
author: pullminder
max_weight: 20
scoring:
  - min_findings: 1
    score: 15
  - min_findings: 2
    score: 20
patterns:
  # --- Existing patterns (1-8) ---

  - name: AWS Access Key
    rule_id: SECRET_AWS_ACCESS_KEY
    regex: 'AKIA[0-9A-Z]{16}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("AWS_ACCESS_KEY_ID")'
      python: 'os.environ["AWS_ACCESS_KEY_ID"]'
      javascript: 'process.env.AWS_ACCESS_KEY_ID'

  - name: AWS Secret Key
    rule_id: SECRET_AWS_SECRET_KEY
    regex: '(?i)aws[_\-]?secret[_\-]?access[_\-]?key\s*[:=]\s*[''"]?[A-Za-z0-9/+=]{40}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("AWS_SECRET_ACCESS_KEY")'
      python: 'os.environ["AWS_SECRET_ACCESS_KEY"]'
      javascript: 'process.env.AWS_SECRET_ACCESS_KEY'

  - name: Generic API Key
    rule_id: SECRET_GENERIC_API_KEY
    regex: '(?i)(api[_\-]?key|apikey)\s*[:=]\s*[''"]?[A-Za-z0-9\-_]{20,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("API_KEY")'
      python: 'os.environ["API_KEY"]'
      javascript: 'process.env.API_KEY'

  - name: Generic Secret
    rule_id: SECRET_GENERIC_SECRET
    regex: '(?i)(secret|password|passwd|token)\s*[:=]\s*[''"]?[A-Za-z0-9\-_!@#$%^&*]{8,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("SECRET")'
      python: 'os.environ["SECRET"]'
      javascript: 'process.env.SECRET'

  - name: Private Key
    rule_id: SECRET_PRIVATE_KEY
    regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    language: "*"
    severity: critical
    category: secret

  - name: GitHub Token
    rule_id: SECRET_GITHUB_TOKEN
    regex: 'gh[pousr]_[A-Za-z0-9_]{36,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("GITHUB_TOKEN")'
      python: 'os.environ["GITHUB_TOKEN"]'
      javascript: 'process.env.GITHUB_TOKEN'

  - name: Slack Token
    rule_id: SECRET_SLACK_TOKEN
    regex: 'xox[baprs]-[0-9A-Za-z\-]{10,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("SLACK_TOKEN")'
      python: 'os.environ["SLACK_TOKEN"]'
      javascript: 'process.env.SLACK_TOKEN'

  - name: Connection String
    rule_id: SECRET_CONNECTION_STRING
    regex: '(?i)(postgres|mysql|mongodb|redis)://[^\s''"]*:[^\s''"]+@'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("DATABASE_URL")'
      python: 'os.environ["DATABASE_URL"]'
      javascript: 'process.env.DATABASE_URL'

  # --- New patterns (9-44) ---

  - name: Stripe Secret Key
    rule_id: SECRET_STRIPE_KEY
    regex: 'sk_live_[0-9a-zA-Z]{24,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("STRIPE_SECRET_KEY")'
      python: 'os.environ["STRIPE_SECRET_KEY"]'
      javascript: 'process.env.STRIPE_SECRET_KEY'

  - name: Stripe Restricted Key
    rule_id: SECRET_STRIPE_RESTRICTED
    regex: 'rk_live_[0-9a-zA-Z]{24,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("STRIPE_RESTRICTED_KEY")'
      python: 'os.environ["STRIPE_RESTRICTED_KEY"]'
      javascript: 'process.env.STRIPE_RESTRICTED_KEY'

  - name: Stripe Publishable Key
    rule_id: SECRET_STRIPE_PUBLISHABLE
    regex: 'pk_live_[0-9a-zA-Z]{24,}'
    language: "*"
    severity: critical
    category: secret

  - name: Google Cloud API Key
    rule_id: SECRET_GCP_API_KEY
    regex: 'AIza[0-9A-Za-z\-_]{35}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("GCP_API_KEY")'
      python: 'os.environ["GCP_API_KEY"]'
      javascript: 'process.env.GCP_API_KEY'

  - name: GCP Service Account JSON
    rule_id: SECRET_GCP_SERVICE_ACCOUNT
    regex: '(?i)"type"\s*:\s*"service_account"'
    language: "*"
    severity: critical
    category: secret

  - name: Azure Storage Key
    rule_id: SECRET_AZURE_STORAGE
    regex: '(?i)DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{86,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("AZURE_STORAGE_CONNECTION_STRING")'
      python: 'os.environ["AZURE_STORAGE_CONNECTION_STRING"]'
      javascript: 'process.env.AZURE_STORAGE_CONNECTION_STRING'

  - name: Azure AD Client Secret
    rule_id: SECRET_AZURE_AD_SECRET
    regex: '(?i)(client[_\-]?secret|azure[_\-]?secret)\s*[:=]\s*[''"]?[A-Za-z0-9\-_.~]{32,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("AZURE_CLIENT_SECRET")'
      python: 'os.environ["AZURE_CLIENT_SECRET"]'
      javascript: 'process.env.AZURE_CLIENT_SECRET'

  - name: Twilio API Key
    rule_id: SECRET_TWILIO
    regex: 'SK[0-9a-fA-F]{32}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("TWILIO_API_KEY")'
      python: 'os.environ["TWILIO_API_KEY"]'
      javascript: 'process.env.TWILIO_API_KEY'

  - name: SendGrid API Key
    rule_id: SECRET_SENDGRID
    regex: 'SG\.[0-9A-Za-z\-_]{22}\.[0-9A-Za-z\-_]{43}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("SENDGRID_API_KEY")'
      python: 'os.environ["SENDGRID_API_KEY"]'
      javascript: 'process.env.SENDGRID_API_KEY'

  - name: Mailchimp API Key
    rule_id: SECRET_MAILCHIMP
    regex: '[0-9a-f]{32}-us[0-9]{1,2}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("MAILCHIMP_API_KEY")'
      python: 'os.environ["MAILCHIMP_API_KEY"]'
      javascript: 'process.env.MAILCHIMP_API_KEY'

  - name: Datadog API Key
    rule_id: SECRET_DATADOG
    regex: '(?i)(datadog[_\-]?api[_\-]?key|dd[_\-]?api[_\-]?key)\s*[:=]\s*[''"]?[a-f0-9]{32}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("DD_API_KEY")'
      python: 'os.environ["DD_API_KEY"]'
      javascript: 'process.env.DD_API_KEY'

  - name: New Relic Key
    rule_id: SECRET_NEWRELIC
    regex: 'NRAK-[A-Z0-9]{27}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("NEW_RELIC_API_KEY")'
      python: 'os.environ["NEW_RELIC_API_KEY"]'
      javascript: 'process.env.NEW_RELIC_API_KEY'

  - name: Shopify Token
    rule_id: SECRET_SHOPIFY
    regex: 'shp(at|ca|pa|ss)_[a-fA-F0-9]{32,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("SHOPIFY_ACCESS_TOKEN")'
      python: 'os.environ["SHOPIFY_ACCESS_TOKEN"]'
      javascript: 'process.env.SHOPIFY_ACCESS_TOKEN'

  - name: Heroku API Key
    rule_id: SECRET_HEROKU
    regex: '(?i)heroku[_\-]?api[_\-]?key\s*[:=]\s*[''"]?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("HEROKU_API_KEY")'
      python: 'os.environ["HEROKU_API_KEY"]'
      javascript: 'process.env.HEROKU_API_KEY'

  - name: DigitalOcean Token
    rule_id: SECRET_DIGITALOCEAN
    regex: 'dop_v1_[a-f0-9]{64}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("DIGITALOCEAN_TOKEN")'
      python: 'os.environ["DIGITALOCEAN_TOKEN"]'
      javascript: 'process.env.DIGITALOCEAN_TOKEN'

  - name: Cloudflare API Token
    rule_id: SECRET_CLOUDFLARE
    regex: '(?i)(cloudflare[_\-]?api[_\-]?token|cf[_\-]?api[_\-]?token)\s*[:=]\s*[''"]?[A-Za-z0-9\-_]{40,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("CLOUDFLARE_API_TOKEN")'
      python: 'os.environ["CLOUDFLARE_API_TOKEN"]'
      javascript: 'process.env.CLOUDFLARE_API_TOKEN'

  - name: JWT Token
    rule_id: SECRET_JWT
    regex: 'eyJ[A-Za-z0-9\-_]+\.eyJ[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+'
    language: "*"
    severity: critical
    category: secret

  - name: NPM Token
    rule_id: SECRET_NPM
    regex: 'npm_[A-Za-z0-9]{36}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("NPM_TOKEN")'
      python: 'os.environ["NPM_TOKEN"]'
      javascript: 'process.env.NPM_TOKEN'

  - name: PyPI Token
    rule_id: SECRET_PYPI
    regex: 'pypi-AgE[A-Za-z0-9\-_]{50,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      python: 'os.environ["PYPI_TOKEN"]'

  - name: NuGet API Key
    rule_id: SECRET_NUGET
    regex: 'oy2[a-z0-9]{43}'
    language: "*"
    severity: critical
    category: secret

  - name: Docker Hub Token
    rule_id: SECRET_DOCKER_HUB
    regex: 'dckr_pat_[A-Za-z0-9\-_]{27,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("DOCKER_HUB_TOKEN")'
      python: 'os.environ["DOCKER_HUB_TOKEN"]'
      javascript: 'process.env.DOCKER_HUB_TOKEN'

  - name: Vercel Token
    rule_id: SECRET_VERCEL
    regex: '(?i)vercel[_\-]?token\s*[:=]\s*[''"]?[A-Za-z0-9]{24,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("VERCEL_TOKEN")'
      python: 'os.environ["VERCEL_TOKEN"]'
      javascript: 'process.env.VERCEL_TOKEN'

  - name: Supabase Key
    rule_id: SECRET_SUPABASE
    regex: '(?i)supabase[_\-]?(key|anon|service)\s*[:=]\s*[''"]?eyJ[A-Za-z0-9\-_]+'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("SUPABASE_KEY")'
      python: 'os.environ["SUPABASE_KEY"]'
      javascript: 'process.env.SUPABASE_KEY'

  - name: Firebase Key
    rule_id: SECRET_FIREBASE
    regex: '(?i)firebase[_\-]?api[_\-]?key\s*[:=]\s*[''"]?AIza[0-9A-Za-z\-_]{35}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("FIREBASE_API_KEY")'
      python: 'os.environ["FIREBASE_API_KEY"]'
      javascript: 'process.env.FIREBASE_API_KEY'

  - name: Okta Token
    rule_id: SECRET_OKTA
    regex: '(?i)okta[_\-]?(token|api[_\-]?key)\s*[:=]\s*[''"]?[A-Za-z0-9\-_]{30,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("OKTA_API_TOKEN")'
      python: 'os.environ["OKTA_API_TOKEN"]'
      javascript: 'process.env.OKTA_API_TOKEN'

  - name: Auth0 Secret
    rule_id: SECRET_AUTH0
    regex: '(?i)auth0[_\-]?(secret|client[_\-]?secret)\s*[:=]\s*[''"]?[A-Za-z0-9\-_]{30,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("AUTH0_CLIENT_SECRET")'
      python: 'os.environ["AUTH0_CLIENT_SECRET"]'
      javascript: 'process.env.AUTH0_CLIENT_SECRET'

  - name: PagerDuty Key
    rule_id: SECRET_PAGERDUTY
    regex: '(?i)(pagerduty|pd)[_\-]?(api[_\-]?key|token)\s*[:=]\s*[''"]?[A-Za-z0-9\-_+]{20,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("PAGERDUTY_API_KEY")'
      python: 'os.environ["PAGERDUTY_API_KEY"]'
      javascript: 'process.env.PAGERDUTY_API_KEY'

  - name: CircleCI Token
    rule_id: SECRET_CIRCLECI
    regex: '(?i)circle[_\-]?ci[_\-]?token\s*[:=]\s*[''"]?[a-f0-9]{40}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("CIRCLECI_TOKEN")'
      python: 'os.environ["CIRCLECI_TOKEN"]'
      javascript: 'process.env.CIRCLECI_TOKEN'

  - name: HashiCorp Vault Token
    rule_id: SECRET_HASHICORP_VAULT
    regex: 'hvs\.[A-Za-z0-9]{24,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("VAULT_TOKEN")'
      python: 'os.environ["VAULT_TOKEN"]'
      javascript: 'process.env.VAULT_TOKEN'

  - name: Telegram Bot Token
    rule_id: SECRET_TELEGRAM
    regex: '[0-9]{8,10}:[A-Za-z0-9_-]{35}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("TELEGRAM_BOT_TOKEN")'
      python: 'os.environ["TELEGRAM_BOT_TOKEN"]'
      javascript: 'process.env.TELEGRAM_BOT_TOKEN'

  - name: Discord Bot Token
    rule_id: SECRET_DISCORD
    regex: '[MN][A-Za-z\d]{23,}\.[\w-]{6}\.[\w-]{27,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("DISCORD_BOT_TOKEN")'
      python: 'os.environ["DISCORD_BOT_TOKEN"]'
      javascript: 'process.env.DISCORD_BOT_TOKEN'

  - name: GitLab Token
    rule_id: SECRET_GITLAB
    regex: 'glpat-[0-9A-Za-z\-_]{20,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("GITLAB_TOKEN")'
      python: 'os.environ["GITLAB_TOKEN"]'
      javascript: 'process.env.GITLAB_TOKEN'

  - name: Linear API Key
    rule_id: SECRET_LINEAR
    regex: 'lin_api_[A-Za-z0-9]{40,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("LINEAR_API_KEY")'
      python: 'os.environ["LINEAR_API_KEY"]'
      javascript: 'process.env.LINEAR_API_KEY'

  - name: OpenAI API Key
    rule_id: SECRET_OPENAI
    regex: 'sk-[A-Za-z0-9]{48,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("OPENAI_API_KEY")'
      python: 'os.environ["OPENAI_API_KEY"]'
      javascript: 'process.env.OPENAI_API_KEY'

  - name: Anthropic API Key
    rule_id: SECRET_ANTHROPIC
    regex: 'sk-ant-[A-Za-z0-9\-_]{90,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("ANTHROPIC_API_KEY")'
      python: 'os.environ["ANTHROPIC_API_KEY"]'
      javascript: 'process.env.ANTHROPIC_API_KEY'

  - name: Notion Integration Token
    rule_id: SECRET_NOTION
    regex: '(ntn_|secret_)[A-Za-z0-9]{40,}'
    language: "*"
    severity: critical
    category: secret
    fix_templates:
      go: 'os.Getenv("NOTION_TOKEN")'
      python: 'os.environ["NOTION_TOKEN"]'
      javascript: 'process.env.NOTION_TOKEN'

overrides:
  scoring:
    type: scored_tiers
    label: "Scoring Tiers"
    description: "Map finding counts to risk scores"
    default_from: scoring
